name: build-and-deploy
run-name: Build the game and save artifact
on:
  workflow_dispatch:
  push:
    branches:
    - "main"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: stamp build version into Info panel
        run: |
          sha=$(git rev-parse --short HEAD)
          ts=$(date -u +"%Y-%m-%d %H:%M UTC")
          sed -i "s/{{BUILD_VERSION}}/${sha} · ${ts}/" Game.lean

      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: false

      - name: compress built game
        #run: tar -czvf ../game.tar.gz .
        run: zip game.zip * .lake/ .i18n/ -r

      - name: upload compressed game folder
        uses: actions/upload-artifact@v4
        with:
          name: build-for-server-import
          path: |
            game.zip

      - name: trigger cloud import
        run: curl -fsSL "https://adam.math.hhu.de/import/trigger/${GITHUB_REPOSITORY,,}"

      - name: verify game is live
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          url="https://adam.math.hhu.de/data/g/${repo}/game.json"
          for i in $(seq 1 30); do
            body=$(curl -fsSL "$url" || true)
            if [ -n "$body" ] && echo "$body" | head -c1 | grep -q '{'; then
              echo "game.json is live: $url"
              echo "Play at https://adam.math.hhu.de/#/g/${repo}"
              exit 0
            fi
            echo "attempt $i/30: import not ready yet, waiting 10s..."
            sleep 10
          done
          echo "::error::game.json did not become available after import trigger — check https://adam.math.hhu.de/import/trigger/${repo} manually"
          exit 1
